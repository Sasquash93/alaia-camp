<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin · Alaia Camp</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/styles.css?v=18" />
<link rel="stylesheet" href="assets/pages.css?v=1" />
<style>
  body{background:var(--cream-2);}
  .adm-top{position:sticky;top:0;z-index:20;background:var(--pine-deeper);color:var(--cream);display:flex;align-items:center;justify-content:space-between;padding:14px 26px;}
  .adm-top .brand{display:flex;align-items:baseline;gap:8px;font-family:'Bricolage Grotesque'}
  .adm-top .brand b{font-size:22px;font-weight:800}.adm-top .brand i{font-style:normal;font-family:'Space Mono';font-size:10px;letter-spacing:.3em;opacity:.8}
  .adm-top .brand .pill{font-family:'Space Mono';font-size:10px;letter-spacing:.12em;background:var(--coral);padding:3px 8px;border-radius:6px;margin-left:8px}
  .adm-wrap{max-width:1120px;margin:0 auto;padding:26px 26px 80px}
  .adm-tabs{display:flex;gap:6px;flex-wrap:wrap;margin:22px 0 26px}
  .adm-tabs button{padding:10px 16px;border-radius:100px;border:1.5px solid var(--line-on-light);background:var(--paper);font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;color:var(--ink-soft)}
  .adm-tabs button.on{background:var(--pine);color:var(--cream);border-color:var(--pine)}
  .adm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .adm-card{background:var(--paper);border:1px solid var(--line-on-light);border-radius:16px;overflow:hidden;box-shadow:var(--shadow-md);display:flex;flex-direction:column}
  .adm-card .thumb{aspect-ratio:1;background:var(--cream-2);position:relative}
  .adm-card .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .adm-card .thumb .noimg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);font-family:'Space Mono';font-size:11px;text-align:center;padding:10px}
  .adm-card .b{padding:14px;display:flex;flex-direction:column;gap:6px;flex:1}
  .adm-card .b .cat{font-family:'Space Mono';font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--moss)}
  .adm-card .b h4{font-size:16px}
  .adm-card .b .pr{font-family:'Bricolage Grotesque';font-weight:800;color:var(--pine);font-size:18px}
  .adm-card .acts{display:flex;gap:8px;padding:0 14px 14px}
  .adm-row{background:var(--paper);border:1px solid var(--line-on-light);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow-md);margin-bottom:12px}
  .modal-bg{position:fixed;inset:0;background:oklch(0.17 0.04 162 / .55);z-index:60;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto}
  .modal-bg.open{display:flex}
  .modal{background:var(--cream);border-radius:18px;max-width:540px;width:100%;box-shadow:var(--shadow-lg);padding:28px}
  .login-card{max-width:400px;margin:9vh auto 0;background:var(--cream);border-radius:20px;box-shadow:var(--shadow-lg);border:1px solid var(--line-on-light);padding:34px}
  .login-card h1{font-size:26px;margin-bottom:6px}
  .err{color:var(--coral-deep);font-size:14px;font-weight:600}
  @media(max-width:860px){.adm-grid{grid-template-columns:1fr 1fr}}
  @media(max-width:560px){.adm-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="admin-app"></div>
<script src="assets/admin.js?v=1"></script>
</body>
</html>
